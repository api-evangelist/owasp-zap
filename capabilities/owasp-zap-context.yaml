        method: GET
        description: Lists the names of all built in technologies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-view-urls
      path: /JSON/context/view/urls/
      operations:
      - name: contextviewurls
        method: GET
        description: Lists the URLs accessed through/by ZAP, that belong to the context with the given name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
