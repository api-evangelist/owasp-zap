          type: object
          value: $.
    - name: JSON-context-view-includedTechnologyList
      path: /JSON/context/view/includedTechnologyList/
      operations:
      - name: contextviewincludedtechnologylist
        method: GET
        description: Lists the names of all technologies included in a context
        outputRawFormat: json
        outputParameters:
