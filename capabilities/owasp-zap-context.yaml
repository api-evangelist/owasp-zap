naftiko: 1.0.0-alpha2
info:
  label: ZAP API — context
  description: 'ZAP API — context. 21 operations. Lead operation: context. Self-contained Naftiko capability covering one
    Owasp Zap business surface.'
  tags:
  - Owasp Zap
  - context
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OWASP_ZAP_API_KEY: OWASP_ZAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: owasp-zap-context
    baseUri: http://zap
    description: ZAP API — context business capability. Self-contained, no shared references.
    resources:
    - name: JSON-context-action-excludeAllContextTechnologies
      path: /JSON/context/action/excludeAllContextTechnologies/
      operations:
      - name: contextactionexcludeallcontexttechnologies
        method: GET
        description: Excludes all built in technologies from a context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-excludeContextTechnologies
      path: /JSON/context/action/excludeContextTechnologies/
      operations:
      - name: contextactionexcludecontexttechnologies
        method: GET
        description: Excludes technologies with the given names, separated by a comma, from a context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-excludeFromContext
      path: /JSON/context/action/excludeFromContext/
      operations:
      - name: contextactionexcludefromcontext
        method: GET
        description: Add exclude regex to context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-exportContext
      path: /JSON/context/action/exportContext/
      operations:
      - name: contextactionexportcontext
        method: GET
        description: Exports the context with the given name to a file. If a relative file path is specified it will be resolved
          against the "contexts" directory in ZAP "home" dir.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-importContext
      path: /JSON/context/action/importContext/
      operations:
      - name: contextactionimportcontext
        method: GET
        description: Imports a context from a file. If a relative file path is specified it will be resolved against the "contexts"
          directory in ZAP "home" dir.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-includeAllContextTechnologies
      path: /JSON/context/action/includeAllContextTechnologies/
      operations:
      - name: contextactionincludeallcontexttechnologies
        method: GET
        description: Includes all built in technologies in to a context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-includeContextTechnologies
      path: /JSON/context/action/includeContextTechnologies/
      operations:
      - name: contextactionincludecontexttechnologies
        method: GET
        description: Includes technologies with the given names, separated by a comma, to a context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-includeInContext
      path: /JSON/context/action/includeInContext/
      operations:
      - name: contextactionincludeincontext
        method: GET
        description: Add include regex to context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-newContext
      path: /JSON/context/action/newContext/
      operations:
      - name: contextactionnewcontext
        method: GET
        description: Creates a new context with the given name in the current session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-removeContext
      path: /JSON/context/action/removeContext/
      operations:
      - name: contextactionremovecontext
        method: GET
        description: Removes a context in the current session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-setContextCheckingStrategy
      path: /JSON/context/action/setContextCheckingStrategy/
      operations:
      - name: contextactionsetcontextcheckingstrategy
        method: GET
        description: Set the checking strategy for a context - this defines how ZAP checks that a request is authenticated
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-setContextInScope
      path: /JSON/context/action/setContextInScope/
      operations:
      - name: contextactionsetcontextinscope
        method: GET
        description: Sets a context to in scope (contexts are in scope by default)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-action-setContextRegexs
      path: /JSON/context/action/setContextRegexs/
      operations:
      - name: contextactionsetcontextregexs
        method: GET
        description: Set the regexs to include and exclude for a context, both supplied as JSON string arrays
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-view-context
      path: /JSON/context/view/context/
      operations:
      - name: contextviewcontext
        method: GET
        description: List the information about the named context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-view-contextList
      path: /JSON/context/view/contextList/
      operations:
      - name: contextviewcontextlist
        method: GET
        description: List context names of current session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-view-excludeRegexs
      path: /JSON/context/view/excludeRegexs/
      operations:
      - name: contextviewexcluderegexs
        method: GET
        description: List excluded regexs for context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-view-excludedTechnologyList
      path: /JSON/context/view/excludedTechnologyList/
      operations:
      - name: contextviewexcludedtechnologylist
        method: GET
        description: Lists the names of all technologies excluded from a context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-context-view-includeRegexs
      path: /JSON/context/view/includeRegexs/
