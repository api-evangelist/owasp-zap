      description: automationactionenddelayjob
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: owasp-zap-automation.automationactionenddelayjob
      outputParameters:
      - type: object
        mapping: $.
    - name: automationactionrunplan
      description: automationactionrunplan
      hints:
        readOnly: true
