        - type: object
          mapping: $.
    - path: /v1/json/automation/view/planprogress
      name: json-automation-view-planprogress
      description: REST surface for JSON-automation-view-planProgress.
      operations:
      - method: GET
        name: automationviewplanprogress
        description: automationviewplanprogress
