naftiko: 1.0.0-alpha2
info:
  label: ZAP API — retest
  description: 'ZAP API — retest. 1 operations. Lead operation: retest. Self-contained Naftiko capability covering one Owasp
    Zap business surface.'
  tags:
  - Owasp Zap
  - retest
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OWASP_ZAP_API_KEY: OWASP_ZAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: owasp-zap-retest
    baseUri: http://zap
    description: ZAP API — retest business capability. Self-contained, no shared references.
    resources:
    - name: JSON-retest-action-retest
      path: /JSON/retest/action/retest/
      operations:
      - name: retestactionretest
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-ZAP-API-Key
      value: '{{env.OWASP_ZAP_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: owasp-zap-retest-rest
    port: 8080
    description: REST adapter for ZAP API — retest. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/json/retest/action/retest
      name: json-retest-action-retest
      description: REST surface for JSON-retest-action-retest.
      operations:
      - method: GET
        name: retestactionretest
        description: retestactionretest
        call: owasp-zap-retest.retestactionretest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: owasp-zap-retest-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZAP API — retest. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retestactionretest
      description: retestactionretest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: owasp-zap-retest.retestactionretest
      outputParameters:
      - type: object
        mapping: $.
