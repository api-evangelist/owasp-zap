naftiko: 1.0.0-alpha2
info:
  label: ZAP API — script
  description: 'ZAP API — script. 24 operations. Lead operation: script. Self-contained Naftiko capability covering one Owasp
    Zap business surface.'
  tags:
  - Owasp Zap
  - script
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OWASP_ZAP_API_KEY: OWASP_ZAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: owasp-zap-script
    baseUri: http://zap
    description: ZAP API — script business capability. Self-contained, no shared references.
    resources:
    - name: JSON-script-action-clearGlobalCustomVar
      path: /JSON/script/action/clearGlobalCustomVar/
      operations:
      - name: scriptactionclearglobalcustomvar
        method: GET
        description: Clears a global custom variable.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-clearGlobalVar
      path: /JSON/script/action/clearGlobalVar/
      operations:
      - name: scriptactionclearglobalvar
        method: GET
        description: Clears the global variable with the given key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-clearGlobalVars
      path: /JSON/script/action/clearGlobalVars/
      operations:
      - name: scriptactionclearglobalvars
        method: GET
        description: Clears the global variables.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-clearScriptCustomVar
      path: /JSON/script/action/clearScriptCustomVar/
      operations:
      - name: scriptactionclearscriptcustomvar
        method: GET
        description: Clears a script custom variable.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-clearScriptVar
      path: /JSON/script/action/clearScriptVar/
      operations:
      - name: scriptactionclearscriptvar
        method: GET
        description: Clears the variable with the given key of the given script. Returns an API error (DOES_NOT_EXIST) if
          no script with the given name exists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-clearScriptVars
      path: /JSON/script/action/clearScriptVars/
      operations:
      - name: scriptactionclearscriptvars
        method: GET
        description: Clears the variables of the given script. Returns an API error (DOES_NOT_EXIST) if no script with the
          given name exists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-disable
      path: /JSON/script/action/disable/
      operations:
      - name: scriptactiondisable
        method: GET
        description: Disables the script with the given name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-enable
      path: /JSON/script/action/enable/
      operations:
      - name: scriptactionenable
        method: GET
        description: Enables the script with the given name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-load
      path: /JSON/script/action/load/
      operations:
      - name: scriptactionload
        method: GET
        description: Loads a script into ZAP from the given local file, with the given name, type and engine, optionally with
          a description, and a charset name to read the script (the charset name is required if the script is not in UTF-8,
          for example, in ISO-8
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-remove
      path: /JSON/script/action/remove/
      operations:
      - name: scriptactionremove
        method: GET
        description: Removes the script with the given name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-runStandAloneScript
      path: /JSON/script/action/runStandAloneScript/
      operations:
      - name: scriptactionrunstandalonescript
        method: GET
        description: Runs the stand alone script with the given name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-setGlobalVar
      path: /JSON/script/action/setGlobalVar/
      operations:
      - name: scriptactionsetglobalvar
        method: GET
        description: Sets the value of the global variable with the given key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-action-setScriptVar
      path: /JSON/script/action/setScriptVar/
      operations:
      - name: scriptactionsetscriptvar
        method: GET
        description: Sets the value of the variable with the given key of the given script. Returns an API error (DOES_NOT_EXIST)
          if no script with the given name exists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-globalCustomVar
      path: /JSON/script/view/globalCustomVar/
      operations:
      - name: scriptviewglobalcustomvar
        method: GET
        description: Gets the value (string representation) of a global custom variable. Returns an API error (DOES_NOT_EXIST)
          if no value was previously set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-globalCustomVars
      path: /JSON/script/view/globalCustomVars/
      operations:
      - name: scriptviewglobalcustomvars
        method: GET
        description: Gets all the global custom variables (key/value pairs, the value is the string representation).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-globalVar
      path: /JSON/script/view/globalVar/
      operations:
      - name: scriptviewglobalvar
        method: GET
        description: Gets the value of the global variable with the given key. Returns an API error (DOES_NOT_EXIST) if no
          value was previously set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-globalVars
      path: /JSON/script/view/globalVars/
      operations:
      - name: scriptviewglobalvars
        method: GET
        description: Gets all the global variables (key/value pairs).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-listEngines
      path: /JSON/script/view/listEngines/
      operations:
      - name: scriptviewlistengines
        method: GET
        description: Lists the script engines available
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-listScripts
      path: /JSON/script/view/listScripts/
      operations:
      - name: scriptviewlistscripts
        method: GET
        description: Lists the scripts available, with its engine, name, description, type and error state.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-listTypes
      path: /JSON/script/view/listTypes/
      operations:
      - name: scriptviewlisttypes
        method: GET
        description: Lists the script types available.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-scriptCustomVar
      path: /JSON/script/view/scriptCustomVar/
      operations:
      - name: scriptviewscriptcustomvar
        method: GET
        description: Gets the value (string representation) of a custom variable. Returns an API error (DOES_NOT_EXIST) if
          no script with the given name exists or if no value was previously set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-scriptCustomVars
      path: /JSON/script/view/scriptCustomVars/
      operations:
      - name: scriptviewscriptcustomvars
        method: GET
        description: Gets all the custom variables (key/value pairs, the value is the string representation) of a script.
          Returns an API error (DOES_NOT_EXIST) if no script with the given name exists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-scriptVar
      path: /JSON/script/view/scriptVar/
      operations:
      - name: scriptviewscriptvar
        method: GET
        description: Gets the value of the variable with the given key for the given script. Returns an API error (DOES_NOT_EXIST)
          if no script with the given name exists or if no value was previously set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-script-view-scriptVars
      path: /JSON/script/view/scriptVars/
      operations:
      - name: scriptviewscriptvars
        method: GET
        description: Gets all the variables (key/value pairs) of the given script. Returns an API error (DOES_NOT_EXIST) if
          no script with the given name exists.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
