naftiko: 1.0.0-alpha2
info:
  label: ZAP API — alert
  description: 'ZAP API — alert. 13 operations. Lead operation: alert. Self-contained Naftiko capability covering one Owasp
    Zap business surface.'
  tags:
  - Owasp Zap
  - alert
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
