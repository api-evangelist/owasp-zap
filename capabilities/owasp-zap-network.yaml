naftiko: 1.0.0-alpha2
info:
  label: ZAP API — network
  description: 'ZAP API — network. 48 operations. Lead operation: network. Self-contained Naftiko capability covering one
    Owasp Zap business surface.'
  tags:
  - Owasp Zap
  - network
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
