        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-optionStatsdPrefix
      path: /JSON/stats/view/optionStatsdPrefix/
      operations:
      - name: statsviewoptionstatsdprefix
        method: GET
        description: Gets the prefix to be applied to all stats sent to the configured Statsd service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-siteStats
      path: /JSON/stats/view/siteStats/
      operations:
      - name: statsviewsitestats
        method: GET
        description: Gets all of the global statistics, optionally filtered by a key prefix
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-stats
      path: /JSON/stats/view/stats/
      operations:
      - name: statsviewstats
        method: GET
        description: Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-ZAP-API-Key
      value: '{{env.OWASP_ZAP_API_KEY}}'
