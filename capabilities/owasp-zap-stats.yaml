naftiko: 1.0.0-alpha2
info:
  label: ZAP API — stats
  description: 'ZAP API — stats. 13 operations. Lead operation: stats. Self-contained Naftiko capability covering one Owasp
    Zap business surface.'
  tags:
  - Owasp Zap
  - stats
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OWASP_ZAP_API_KEY: OWASP_ZAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: owasp-zap-stats
    baseUri: http://zap
    description: ZAP API — stats business capability. Self-contained, no shared references.
    resources:
    - name: JSON-stats-action-clearStats
      path: /JSON/stats/action/clearStats/
      operations:
      - name: statsactionclearstats
        method: GET
        description: Clears all of the statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-action-setOptionInMemoryEnabled
      path: /JSON/stats/action/setOptionInMemoryEnabled/
      operations:
      - name: statsactionsetoptioninmemoryenabled
        method: GET
        description: Sets whether in memory statistics are enabled
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-action-setOptionStatsdHost
      path: /JSON/stats/action/setOptionStatsdHost/
      operations:
      - name: statsactionsetoptionstatsdhost
        method: GET
        description: Sets the Statsd service hostname, supply an empty string to stop using a Statsd service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-action-setOptionStatsdPort
      path: /JSON/stats/action/setOptionStatsdPort/
      operations:
      - name: statsactionsetoptionstatsdport
        method: GET
        description: Sets the Statsd service port
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-action-setOptionStatsdPrefix
      path: /JSON/stats/action/setOptionStatsdPrefix/
      operations:
      - name: statsactionsetoptionstatsdprefix
        method: GET
        description: Sets the prefix to be applied to all stats sent to the configured Statsd service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-allSitesStats
      path: /JSON/stats/view/allSitesStats/
      operations:
      - name: statsviewallsitesstats
        method: GET
        description: Gets all of the site based statistics, optionally filtered by a key prefix
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-optionInMemoryEnabled
      path: /JSON/stats/view/optionInMemoryEnabled/
      operations:
      - name: statsviewoptioninmemoryenabled
        method: GET
        description: Returns 'true' if in memory statistics are enabled, otherwise returns 'false'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-optionStatsdEnabled
      path: /JSON/stats/view/optionStatsdEnabled/
      operations:
      - name: statsviewoptionstatsdenabled
        method: GET
        description: Returns 'true' if a Statsd server has been correctly configured, otherwise returns 'false'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-optionStatsdHost
      path: /JSON/stats/view/optionStatsdHost/
      operations:
      - name: statsviewoptionstatsdhost
        method: GET
        description: Gets the Statsd service hostname
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: JSON-stats-view-optionStatsdPort
      path: /JSON/stats/view/optionStatsdPort/
      operations:
      - name: statsviewoptionstatsdport
        method: GET
        description: Gets the Statsd service port
