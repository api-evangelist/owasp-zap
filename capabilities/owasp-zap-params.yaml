naftiko: 1.0.0-alpha2
info:
  label: ZAP API — params
  description: 'ZAP API — params. 1 operations. Lead operation: params. Self-contained Naftiko capability covering one Owasp
    Zap business surface.'
  tags:
  - Owasp Zap
  - params
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OWASP_ZAP_API_KEY: OWASP_ZAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: owasp-zap-params
    baseUri: http://zap
    description: ZAP API — params business capability. Self-contained, no shared references.
    resources:
    - name: JSON-params-view-params
      path: /JSON/params/view/params/
      operations:
      - name: paramsviewparams
        method: GET
        description: Shows the parameters for the specified site, or for all sites if the site is not specified
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-ZAP-API-Key
      value: '{{env.OWASP_ZAP_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: owasp-zap-params-rest
    port: 8080
    description: REST adapter for ZAP API — params. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/json/params/view/params
      name: json-params-view-params
      description: REST surface for JSON-params-view-params.
      operations:
      - method: GET
        name: paramsviewparams
        description: Shows the parameters for the specified site, or for all sites if the site is not specified
        call: owasp-zap-params.paramsviewparams
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: owasp-zap-params-mcp
    port: 9090
    transport: http
    description: MCP adapter for ZAP API — params. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: shows-parameters-specified-site-all
      description: Shows the parameters for the specified site, or for all sites if the site is not specified
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: owasp-zap-params.paramsviewparams
      outputParameters:
      - type: object
        mapping: $.
