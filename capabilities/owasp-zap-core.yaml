    description: MCP adapter for ZAP API — core. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: convenient-and-simple-action-access
      description: Convenient and simple action to access a URL, optionally following redirections. Returns the request sent
        and response received and followed redirections, if any. Other actions are available which offer more control on what
        is sent, like, '
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: owasp-zap-core.coreactionaccessurl
      outputParameters:
      - type: object
        mapping: $.
