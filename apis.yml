aid: owasp-zap
name: OWASP ZAP
description: >-
  OWASP ZAP (Zed Attack Proxy) is an open source web application security scanner for finding vulnerabilities in APIs
  and web applications during development and testing. ZAP exposes a comprehensive HTTP API for controlling and
  automating scans, spidering, authentication, alerts, reporting, and more.
